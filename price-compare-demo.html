<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比價快找 ｜ 跨平台商品比價原型</title>
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<style>
  :root{
    --bg: #12141c;
    --surface: #1b1e29;
    --surface-2: #232733;
    --line: #2c303d;
    --text: #f1efe8;
    --text-muted: #8a8f9f;
    --accent: #6ff2b8;      /* 訊號燈：效能 / 最低價 */
    --accent-dim: #2f4f42;
    --pchome: #ffb020;
    --shopee: #ff6a3d;
    --momo: #ff4d6d;
    --mono: 'IBM Plex Mono', 'Menlo', monospace;
    --disp: 'Space Grotesk', 'Noto Sans TC', sans-serif;
    --body: 'Inter', 'Noto Sans TC', sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);}
  .app{max-width:1080px;margin:0 auto;padding:32px 20px 80px;}

  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;}
  h1{font-family:var(--disp);font-weight:700;font-size:clamp(28px,4vw,40px);margin:8px 0 6px;letter-spacing:-.01em;}
  .sub{color:var(--text-muted);font-size:14px;line-height:1.6;max-width:640px;}

  .search-bar{
    margin-top:28px;display:flex;gap:10px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:8px;
  }
  .search-bar input{
    flex:1;background:transparent;border:none;outline:none;color:var(--text);
    font-family:var(--mono);font-size:16px;padding:10px 12px;
  }
  .search-bar button{
    background:var(--accent);color:#0b1310;border:none;border-radius:8px;
    font-family:var(--disp);font-weight:700;font-size:14px;padding:0 22px;cursor:pointer;
    transition:transform .12s ease;
  }
  .search-bar button:hover{transform:translateY(-1px);}
  .search-bar button:active{transform:translateY(0);}

  .section-label{
    font-family:var(--mono);font-size:12px;color:var(--text-muted);
    letter-spacing:.08em;text-transform:uppercase;margin:36px 0 14px;
    display:flex;align-items:center;gap:8px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--line);}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:18px;position:relative;overflow:hidden;transition:border-color .15s ease;
  }
  .card.best{border-color:var(--accent);}
  .ribbon{
    position:absolute;top:14px;right:14px;background:var(--accent);color:#0b1310;
    font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;
  }
  .tag{
    display:inline-block;font-family:var(--disp);font-weight:700;font-size:13px;
    padding:3px 10px;border-radius:6px;color:#0b0b0b;margin-bottom:12px;
  }
  .tag.pchome{background:var(--pchome);}
  .tag.shopee{background:var(--shopee);color:#fff;}
  .tag.momo{background:var(--momo);color:#fff;}

  .prod-title{font-size:14px;line-height:1.5;color:var(--text);min-height:42px;margin-bottom:10px;}
  .price{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.01em;color:var(--text);
    font-variant-numeric:tabular-nums;}
  .price small{font-size:13px;color:var(--text-muted);font-weight:400;margin-right:2px;}
  .meta{display:flex;justify-content:space-between;align-items:center;margin:10px 0 14px;
    font-family:var(--mono);font-size:11px;color:var(--text-muted);}
  .match{color:var(--accent);}

  .go-btn{
    display:block;width:100%;text-align:center;text-decoration:none;
    background:var(--surface-2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:10px;font-family:var(--body);font-weight:600;font-size:13px;
    transition:background .15s ease, border-color .15s ease;
  }
  .go-btn:hover{background:#2a2f3d;border-color:#3a4050;}

  .track-panel{
    margin-top:14px;background:var(--surface);border:1px dashed var(--line);
    border-radius:10px;padding:12px 14px;font-family:var(--mono);font-size:11.5px;color:var(--text-muted);
  }
  .track-panel .row{padding:3px 0;border-bottom:1px solid var(--line);}
  .track-panel .row:last-child{border-bottom:none;}
  .track-panel .plat{color:var(--accent);}

  /* virtual list */
  .vl-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .vl-toolbar select, .vl-toolbar input{
    background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:7px 10px;font-family:var(--body);font-size:12.5px;
  }
  .fps{
    margin-left:auto;font-family:var(--mono);font-size:12px;padding:5px 10px;border-radius:999px;
    background:var(--surface-2);border:1px solid var(--line);
  }
  .fps.good{color:var(--accent);border-color:var(--accent-dim);}
  .fps.bad{color:#ff6a6a;}

  .vl-container{
    height:420px;overflow-y:auto;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;position:relative;
  }
  .vl-spacer{position:relative;width:100%;}
  .vl-row{
    position:absolute;left:0;right:0;display:grid;
    grid-template-columns:52px 1fr 90px 110px;gap:12px;align-items:center;
    padding:0 16px;border-bottom:1px solid var(--line);font-size:13px;
  }
  .vl-row .idx{font-family:var(--mono);color:var(--text-muted);font-size:11px;}
  .vl-row .name{color:var(--text);}
  .vl-row .plat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
  .vl-row .price-cell{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums;}

  footer{margin-top:48px;color:var(--text-muted);font-size:11.5px;font-family:var(--mono);
    border-top:1px solid var(--line);padding-top:16px;line-height:1.7;}
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
const { createApp, ref, reactive, computed, onMounted, onBeforeUnmount, nextTick } = Vue;

/* ---------- 平台設定 ---------- */
const PLATFORMS = [
  { key: 'pchome', name: 'PChome 24h', tagClass: 'pchome', color: '#ffb020',
    searchUrl: q => `https://24h.pchome.com.tw/search/?q=${encodeURIComponent(q)}` },
  { key: 'shopee', name: '蝦皮購物', tagClass: 'shopee', color: '#ff6a3d',
    searchUrl: q => `https://shopee.tw/search?keyword=${encodeURIComponent(q)}` },
  { key: 'momo', name: 'momo購物網', tagClass: 'momo', color: '#ff4d6d',
    searchUrl: q => `https://www.momoshop.com.tw/search/searchShop.jsp?keyword=${encodeURIComponent(q)}` },
];

/* ---------- 模擬「統一 Data Schema + 關鍵字權重比對」結果 ----------
   實務上這段資料應由 .NET Core 後端的 ProductAggregationService 產出，
   這裡用固定亂數模擬三平台各自回傳、已被歸類為同一 SKU 的商品 */
function buildMockResults(keyword){
  const base = 32900; // iPhone 16 128G 官網參考價
  const variance = (seed) => Math.round((Math.sin(seed) * 900 + seed * 37) % 1400);
  return PLATFORMS.map((p, i) => {
    const price = base - 300 - variance(i * 91 + keyword.length * 13) % 1600 + i * 120;
    return {
      platform: p,
      title: `Apple ${keyword} 128GB 全新未拆 原廠公司貨`,
      price: Math.max(29900, price),
      matchConfidence: (94 + (i % 3) * 1.6).toFixed(1),
      shipping: i === 1 ? '免運・24hr到貨' : '免運',
    };
  });
}

/* ---------- 模擬萬筆商品（供虛擬捲動示範） ---------- */
function buildBigList(count){
  const names = ['iPhone 16', 'iPhone 16 Pro', 'iPhone 15', 'AirPods Pro', 'MacBook Air M3',
    'iPad Air', 'Apple Watch S10', 'Galaxy S24', 'Xperia 1 VI', 'Pixel 9'];
  const arr = new Array(count);
  for (let i = 0; i < count; i++){
    const plat = PLATFORMS[i % 3];
    arr[i] = {
      id: i,
      name: `${names[i % names.length]} #${1000 + i}`,
      platform: plat,
      price: 3000 + ((i * 97) % 60000),
    };
  }
  return arr;
}

const App = {
  setup(){
    const keyword = ref('iPhone 16');
    const results = ref(buildMockResults('iPhone 16'));
    const trackLog = reactive([]);

    const lowestPrice = computed(() => Math.min(...results.value.map(r => r.price)));

    function doSearch(){
      if (!keyword.value.trim()) return;
      results.value = buildMockResults(keyword.value.trim());
    }

    /* ---------- 導購追蹤 API 模擬 (Tracking API) ----------
       正式環境會是 POST /api/track/click，非同步寫入 Kafka/Queue，
       再由背景 Worker 批次落地，確保高併發下不阻塞導購跳轉 */
    function track(item){
      const entry = {
        time: new Date().toLocaleTimeString('zh-TW', { hour12: false }),
        platform: item.platform.name,
        price: item.price,
        keyword: keyword.value,
      };
      trackLog.unshift(entry);
      if (trackLog.length > 5) trackLog.pop();
    }

    /* ---------- 虛擬捲動 (Virtual Scroll) ---------- */
    const ROW_H = 44;
    const BUFFER = 6;
    const allItems = buildBigList(10000);
    const filterPlat = ref('all');
    const sortMode = ref('default');

    const filteredItems = computed(() => {
      let list = filterPlat.value === 'all'
        ? allItems
        : allItems.filter(x => x.platform.key === filterPlat.value);
      if (sortMode.value === 'price_asc') list = [...list].sort((a,b)=>a.price-b.price);
      if (sortMode.value === 'price_desc') list = [...list].sort((a,b)=>b.price-a.price);
      return list;
    });

    const scrollTop = ref(0);
    const viewportH = ref(420);
    const containerRef = ref(null);

    function onScroll(e){ scrollTop.value = e.target.scrollTop; }

    const visibleRange = computed(() => {
      const start = Math.max(0, Math.floor(scrollTop.value / ROW_H) - BUFFER);
      const visibleCount = Math.ceil(viewportH.value / ROW_H) + BUFFER * 2;
      const end = Math.min(filteredItems.value.length, start + visibleCount);
      return { start, end };
    });

    const visibleItems = computed(() => {
      const { start, end } = visibleRange.value;
      return filteredItems.value.slice(start, end).map((item, i) => ({
        ...item, top: (start + i) * ROW_H,
      }));
    });

    const totalHeight = computed(() => filteredItems.value.length * ROW_H);

    /* ---------- FPS 監測（驗證虛擬捲動效能） ---------- */
    const fps = ref(60);
    let frames = 0, lastTs = performance.now(), raf;
    function loop(ts){
      frames++;
      if (ts - lastTs >= 500){
        fps.value = Math.round((frames * 1000) / (ts - lastTs));
        frames = 0; lastTs = ts;
      }
      raf = requestAnimationFrame(loop);
    }
    onMounted(() => { raf = requestAnimationFrame(loop); });
    onBeforeUnmount(() => cancelAnimationFrame(raf));

    return {
      keyword, results, lowestPrice, doSearch, track, trackLog,
      filterPlat, sortMode, filteredItems, visibleItems, totalHeight, onScroll, fps,
      PLATFORMS,
    };
  },
  template: `
  <div>
    <div class="eyebrow">CROSS-PLATFORM PRICE COMPARE / PROTOTYPE</div>
    <h1>比價快找</h1>
    <p class="sub">同時查詢 PChome 24h、蝦皮購物、momo購物網的商品售價，一鍵導購到最划算的平台。
      本頁為前端技術展示，價格為模擬資料。</p>

    <div class="search-bar">
      <input v-model="keyword" @keyup.enter="doSearch" placeholder="輸入商品名稱，例如 iPhone 16" />
      <button @click="doSearch">比價</button>
    </div>

    <div class="section-label">三平台比價結果</div>
    <div class="cards">
      <div v-for="r in results" :key="r.platform.key" class="card" :class="{best: r.price === lowestPrice}">
        <div v-if="r.price === lowestPrice" class="ribbon">最低價</div>
        <span class="tag" :class="r.platform.tagClass">{{ r.platform.name }}</span>
        <div class="prod-title">{{ r.title }}</div>
        <div class="price"><small>NT$</small>{{ r.price.toLocaleString() }}</div>
        <div class="meta">
          <span class="match">比對信心度 {{ r.matchConfidence }}%</span>
          <span>{{ r.shipping }}</span>
        </div>
        <a class="go-btn" :href="r.platform.searchUrl(keyword)" target="_blank" rel="noopener"
           @click="track(r)">
          前往 {{ r.platform.name }} 購買 →
        </a>
      </div>
    </div>

    <div class="track-panel">
      <div style="margin-bottom:6px;color:var(--text)">導購追蹤紀錄（Tracking API 模擬）</div>
      <div v-if="trackLog.length === 0">尚無點擊紀錄，點擊上方「前往購買」按鈕試試看。</div>
      <div v-for="(t,i) in trackLog" :key="i" class="row">
        [{{ t.time }}] <span class="plat">{{ t.platform }}</span> ・ 關鍵字「{{ t.keyword }}」・ NT$ {{ t.price.toLocaleString() }}
      </div>
    </div>

    <div class="section-label">全站商品瀏覽（虛擬捲動示範・共 10,000 筆）</div>
    <div class="vl-toolbar">
      <select v-model="filterPlat">
        <option value="all">全部平台</option>
        <option value="pchome">PChome 24h</option>
        <option value="shopee">蝦皮購物</option>
        <option value="momo">momo購物網</option>
      </select>
      <select v-model="sortMode">
        <option value="default">預設排序</option>
        <option value="price_asc">價格由低到高</option>
        <option value="price_desc">價格由高到低</option>
      </select>
      <span class="fps" :class="fps >= 55 ? 'good' : 'bad'">{{ fps }} FPS</span>
    </div>

    <div class="vl-container" @scroll="onScroll">
      <div class="vl-spacer" :style="{ height: totalHeight + 'px' }">
        <div v-for="item in visibleItems" :key="item.id" class="vl-row"
             :style="{ transform: 'translateY(' + item.top + 'px)', height: '44px' }">
          <span class="idx">#{{ item.id }}</span>
          <span class="name">
            <span class="plat-dot" :style="{ background: item.platform.color }"></span>{{ item.name }}
          </span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">{{ item.platform.name }}</span>
          <span class="price-cell">NT$ {{ item.price.toLocaleString() }}</span>
        </div>
      </div>
    </div>

    <footer>
      ※ 此頁為前端原型展示：搜尋結果與商品清單皆為模擬資料，「前往購買」按鈕會導向各平台真實的商品搜尋頁面。<br/>
      實際上線需串接 .NET Core 後端（資料聚合、Redis 快取、Tracking API），詳見對應後端範例程式碼。
    </footer>
  </div>
  `
};

createApp(App).mount('#app');
</script>
</body>
</html>
